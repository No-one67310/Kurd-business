<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurd Business | کورد بزنس</title>
    <style>
        :root {
            --gold: #f1c40f;
            --white: #ffffff;
            --dark: #0a0a0a;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: white;
            overflow: hidden;
        }

        /* ستایڵی شوشەیی بۆ کارتەکە */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        /* لۆگۆ بە درەوشانەوەی ئاڵتوونی */
        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--gold);
            padding: 5px;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo:hover {
            transform: scale(1.1) rotate(10deg);
        }

        h1 {
            font-size: 34px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .motto {
            font-size: 18px;
            color: #ccc;
            margin: 20px 0 40px;
            line-height: 1.6;
        }

        /* دوگمەی لێنکە نوێیەکە */
        .business-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #f1c40f, #d4ac0d);
            color: #000;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 20px;
            transition: 0.4s ease;
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.3);
        }

        .business-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(241, 196, 15, 0.5);
            background: linear-gradient(45deg, #fff, #f1c40f);
        }

        .url-display {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="8471.jpg" alt="Kurd Business" class="logo">
        
        <h1>کورد بزنس</h1>
        
        <div class="motto">
            ئەتـوانـیـن بـتـگـەیـنـە <br> 
            <strong style="color: var(--gold);">لوتکەی بازرگانی</strong>
        </div>

        <a href="https://kurd_bussines.com" class="business-btn">
            دەستپێکردنی گەشتەکە
        </a>

        <div class="url-display">
            kurd_bussines.com
        </div>
    </div>

</body>
</html>
